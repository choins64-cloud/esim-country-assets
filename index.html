<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>eSIM Country Assets</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}
    body{margin:0;background:#101318;color:#f6f7f9;font-family:Arial,sans-serif}
    header{padding:24px;position:sticky;top:0;z-index:2;background:#101318ee;backdrop-filter:blur(8px);border-bottom:1px solid #252c36}
    h1{margin:0 0 16px;font-size:24px}
    .metrics{display:grid;grid-template-columns:repeat(3,minmax(140px,220px));gap:10px}
    .metric{padding:12px 14px;border:1px solid #29313c;border-radius:10px;background:#181d24}
    .metric strong{display:block;font-size:24px;line-height:1.1}
    .metric span{display:block;margin-top:5px;font-size:12px;color:#aeb7c4}
    #status{margin:12px 0 0;color:#aeb7c4;font-size:13px}
    main{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:24px}
    article{overflow:hidden;border:1px solid #29313c;border-radius:12px;background:#181d24}
    img{display:block;width:100%;aspect-ratio:3/2;object-fit:cover}
    .info{padding:12px}.name{font-weight:700}.source{margin-top:5px;font-size:12px;color:#aeb7c4}
    @media(max-width:600px){header{padding:18px 16px}.metrics{grid-template-columns:repeat(2,1fr)}main{padding:16px;grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <h1>eSIM Country Assets</h1>
    <section class="metrics" aria-label="이미지 수집 현황">
      <div class="metric"><strong id="completed-total">- / 248</strong><span>완료 / 전체</span></div>
      <div class="metric"><strong id="completion-rate">-</strong><span>완료율</span></div>
      <div class="metric"><strong id="remaining">-</strong><span>남음</span></div>
    </section>
    <p id="status">현황을 불러오는 중...</p>
  </header>
  <main id="gallery"></main>
  <script>
    const TOTAL_COUNTRIES = 248;
    const setText = (id, value) => { document.querySelector(id).textContent = value; };
    async function loadPage() {
      const manifestResponse = await fetch('./manifest.json', {cache: 'no-store'});
      if (!manifestResponse.ok) throw new Error('manifest HTTP ' + manifestResponse.status);
      const manifest = await manifestResponse.json();
      const entries = Object.entries(manifest.countries || {}).sort(([a], [b]) => a.localeCompare(b));
      const completed = entries.length;
      setText('#completed-total', completed + ' / ' + TOTAL_COUNTRIES);
      setText('#completion-rate', (completed / TOTAL_COUNTRIES * 100).toFixed(1) + '%');
      setText('#remaining', Math.max(0, TOTAL_COUNTRIES - completed));
      document.querySelector('#gallery').innerHTML = entries.map(([code, item]) =>
        '<article><img src="./images/' + code.toLowerCase() + '.jpg" loading="lazy" alt="' + (item.countryName || code) + '">' +
        '<div class="info"><div class="name">' + code + ' · ' + (item.countryName || code) + '</div>' +
        '<div class="source">Photo by ' + (item.photographer || 'Unknown') + ' on Unsplash</div></div></article>'
      ).join('');
      const updatedAt = manifest.generatedAt ? new Date(manifest.generatedAt).toLocaleString('ko-KR') : '정보 없음';
      setText('#status', '공개 저장소 기준 · 업데이트 ' + updatedAt);
    }
    loadPage().catch(error => setText('#status', '불러오기 실패: ' + error.message));
  </script>
</body>
</html>
